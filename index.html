<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URLcut — Encurtador</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ec;
      --ink: #0f0e0b;
      --muted: #9a9485;
      --border: #ddd9d0;
      --accent: #e8450a;
      --accent-light: #fff0eb;
      --surface: #ffffff;
      --green: #1a7a4a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 32px 80px; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 40px 0 0;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 20px;
      margin-bottom: 60px;
      animation: slideDown 0.5s ease both;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.2rem;
      letter-spacing: 2px;
      line-height: 1;
      color: var(--ink);
    }
    .logo span { color: var(--accent); }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── HERO INPUT ── */
    .hero {
      margin-bottom: 64px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .hero-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 0;
      border: 2px solid var(--ink);
      border-radius: 0;
      background: var(--surface);
      overflow: hidden;
      box-shadow: 6px 6px 0 var(--ink);
      transition: box-shadow 0.15s;
    }
    .input-row:focus-within { box-shadow: 8px 8px 0 var(--accent); }

    .input-row input {
      flex: 1;
      border: none;
      outline: none;
      padding: 18px 22px;
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      background: transparent;
      color: var(--ink);
    }
    .input-row input::placeholder { color: var(--muted); }

    .input-divider { width: 2px; background: var(--ink); flex-shrink: 0; }

    .slug-input {
      width: 160px !important;
      flex: none !important;
      border-left: none !important;
      font-size: 0.85rem !important;
    }

    .btn-shorten {
      padding: 18px 32px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-shorten:hover { background: #c73a08; }
    .btn-shorten:active { transform: scale(0.98); }

    .toast {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 10px 16px;
      border-left: 3px solid;
      animation: fadeUp 0.2s ease;
    }
    .toast.error { border-color: var(--accent); color: var(--accent); background: var(--accent-light); display: flex; }
    .toast.success { border-color: var(--green); color: var(--green); background: #f0fff7; display: flex; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 0;
      border: 2px solid var(--ink);
      margin-bottom: 48px;
      animation: fadeUp 0.5s 0.2s ease both;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .stat-item {
      flex: 1;
      padding: 20px 24px;
      border-right: 2px solid var(--ink);
    }
    .stat-item:last-child { border-right: none; }

    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--accent);
      line-height: 1;
    }

    .stat-desc {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── URL TABLE ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
    }

    .section-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .url-table {
      border: 2px solid var(--ink);
      background: var(--surface);
      box-shadow: 4px 4px 0 var(--ink);
      animation: fadeUp 0.5s 0.35s ease both;
    }

    .url-table-head {
      display: grid;
      grid-template-columns: 1fr 220px 90px 80px;
      padding: 12px 20px;
      background: var(--ink);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      gap: 16px;
    }

    .url-row {
      display: grid;
      grid-template-columns: 1fr 220px 90px 80px;
      padding: 16px 20px;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.15s;
      animation: fadeUp 0.25s ease both;
    }
    .url-row:last-child { border-bottom: none; }
    .url-row:hover { background: var(--bg); }

    .url-original {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .url-short-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .url-short-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .url-short-link:hover { text-decoration: underline; }

    .clicks-pill {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: var(--ink);
    }

    .row-actions { display: flex; gap: 6px; justify-content: flex-end; }

    .btn-sm {
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      padding: 5px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 2px;
    }
    .btn-sm:hover { border-color: var(--ink); color: var(--ink); }
    .btn-sm.copied { border-color: var(--green); color: var(--green); }
    .btn-sm.del:hover { border-color: var(--accent); color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .empty-state strong {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--border);
      margin-bottom: 8px;
    }

    /* ── ANALYTICS PANEL ── */
    .analytics-panel {
      margin-top: 48px;
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .analytics-panel.open { display: block; }

    .analytics-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .analytics-card {
      border: 2px solid var(--ink);
      background: var(--surface);
      padding: 20px 24px;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .analytics-card-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .big-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: var(--accent);
      line-height: 1;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .bar-key {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      width: 90px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.7s cubic-bezier(.16,1,.3,1);
    }
    .bar-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      width: 20px;
      text-align: right;
    }

    .btn-close-analytics {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      padding: 5px 12px;
      cursor: pointer;
    }
    .btn-close-analytics:hover { color: var(--ink); border-color: var(--ink); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 680px) {
      .url-table-head, .url-row { grid-template-columns: 1fr 90px; }
      .url-table-head > *:nth-child(2),
      .url-row > *:nth-child(2) { display: none; }
      .analytics-grid { grid-template-columns: 1fr; }
      .input-row { flex-direction: column; box-shadow: 4px 4px 0 var(--ink); }
      .input-divider { width: 100%; height: 2px; }
      .slug-input { width: 100% !important; }
      .stats-bar { flex-direction: column; }
      .stat-item { border-right: none; border-bottom: 2px solid var(--ink); }
      .stat-item:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">URL<span>cut</span></div>
    <div class="tagline">Encurtador de links · analytics em tempo real</div>
  </header>

  <!-- INPUT -->
  <div class="hero">
    <div class="hero-label">Cole sua URL longa</div>
    <div class="input-row">
      <input type="url" id="url-input" placeholder="https://exemplo.com/sua-url-muito-longa-aqui" />
      <div class="input-divider"></div>
      <input type="text" id="slug-input" class="slug-input" placeholder="slug (opcional)" />
      <div class="input-divider"></div>
      <button class="btn-shorten" onclick="createUrl()">Encurtar →</button>
    </div>
    <div id="toast" class="toast"></div>
  </div>

  <!-- STATS -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-desc">Links criados</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-clicks">0</div>
      <div class="stat-desc">Total de cliques</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-today">0</div>
      <div class="stat-desc">Criados hoje</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="section-header">
    <div class="section-title">Seus links</div>
    <div class="section-count" id="url-count">0 links</div>
  </div>

  <div class="url-table">
    <div class="url-table-head">
      <span>URL Original</span>
      <span>Link Curto</span>
      <span>Cliques</span>
      <span>Ações</span>
    </div>
    <div id="url-list">
      <div class="empty-state">
        <strong>VAZIO</strong>
        Cole uma URL acima para começar
      </div>
    </div>
  </div>

  <!-- ANALYTICS -->
  <div class="analytics-panel" id="analytics-panel">
    <div class="analytics-header">
      <div class="section-title">Analytics — <span id="analytics-slug" style="color:var(--accent)"></span></div>
      <button class="btn-close-analytics" onclick="closeAnalytics()">✕ fechar</button>
    </div>
    <div class="analytics-grid" id="analytics-grid"></div>
  </div>

</div>

<script>
  const API = 'http://localhost:3000'
  let allUrls = []

  // ── Init ──
  loadUrls()

  function showToast(msg, type = 'error') {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = `toast ${type}`
    clearTimeout(t._timer)
    t._timer = setTimeout(() => t.className = 'toast', 3500)
  }

  async function loadUrls() {
    try {
      const res = await fetch(`${API}/urls`)
      allUrls = await res.json()
      renderAll()
    } catch { showToast('Servidor offline. Rode npm run dev') }
  }

  function renderAll() {
    renderUrls()
    renderStats()
  }

  function renderStats() {
    const today = new Date().toDateString()
    document.getElementById('stat-total').textContent = allUrls.length
    document.getElementById('stat-clicks').textContent = allUrls.reduce((s, u) => s + u.totalClicks, 0)
    document.getElementById('stat-today').textContent = allUrls.filter(u => new Date(u.createdAt).toDateString() === today).length
    document.getElementById('url-count').textContent = `${allUrls.length} link${allUrls.length !== 1 ? 's' : ''}`
  }

  function renderUrls() {
    const list = document.getElementById('url-list')
    if (!allUrls.length) {
      list.innerHTML = `<div class="empty-state"><strong>VAZIO</strong>Cole uma URL acima para começar</div>`
      return
    }
    list.innerHTML = allUrls.map((url, i) => `
      <div class="url-row" style="animation-delay:${i * 0.04}s">
        <div class="url-original" title="${url.original}">${url.original}</div>
        <div class="url-short-cell">
          <a class="url-short-link" href="${url.shortUrl}" target="_blank">${url.shortUrl}</a>
        </div>
        <div class="clicks-pill">${url.totalClicks}</div>
        <div class="row-actions">
          <button class="btn-sm" onclick="copyUrl('${url.shortUrl}', this)">copiar</button>
          <button class="btn-sm" onclick="openAnalytics('${url.slug}')">stats</button>
          <button class="btn-sm del" onclick="deleteUrl('${url.slug}')">✕</button>
        </div>
      </div>
    `).join('')
  }

  async function createUrl() {
    const original = document.getElementById('url-input').value.trim()
    const slug = document.getElementById('slug-input').value.trim()

    if (!original) return showToast('Cole uma URL primeiro')

    try { new URL(original) } catch { return showToast('URL inválida') }

    const body = { original }
    if (slug) body.slug = slug

    const res = await fetch(`${API}/urls`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    const data = await res.json()
    if (!res.ok) return showToast(data.error)

    document.getElementById('url-input').value = ''
    document.getElementById('slug-input').value = ''
    showToast(`✓ ${data.shortUrl}`, 'success')
    allUrls.unshift(data)
    renderAll()
  }

  async function deleteUrl(slug) {
    if (!confirm('Remover este link?')) return
    await fetch(`${API}/urls/${slug}`, { method: 'DELETE' })
    allUrls = allUrls.filter(u => u.slug !== slug)
    renderAll()
    if (document.getElementById('analytics-slug').textContent === slug) closeAnalytics()
  }

  function copyUrl(url, btn) {
    navigator.clipboard.writeText(url)
    btn.textContent = '✓ ok'
    btn.classList.add('copied')
    setTimeout(() => { btn.textContent = 'copiar'; btn.classList.remove('copied') }, 2000)
  }

  async function openAnalytics(slug) {
    const res = await fetch(`${API}/urls/${slug}/analytics`)
    const data = await res.json()
    if (!res.ok) return

    const { url, analytics } = data
    document.getElementById('analytics-slug').textContent = slug

    const maxD = Math.max(...Object.values(analytics.byDevice || { _: 1 }), 1)
    const maxB = Math.max(...Object.values(analytics.byBrowser || { _: 1 }), 1)

    const bars = (obj, max) => Object.entries(obj).length
      ? Object.entries(obj).map(([k, v]) => `
          <div class="bar-row">
            <span class="bar-key">${k}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%"></div></div>
            <span class="bar-val">${v}</span>
          </div>`).join('')
      : '<p style="font-family:\'DM Mono\',monospace;font-size:.75rem;color:var(--muted)">Sem dados ainda</p>'

    document.getElementById('analytics-grid').innerHTML = `
      <div class="analytics-card">
        <div class="analytics-card-title">Total de cliques</div>
        <div class="big-num">${url.totalClicks}</div>
        <div style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:8px;word-break:break-all">${url.original}</div>
      </div>
      <div class="analytics-card">
        <div class="analytics-card-title">Link encurtado</div>
        <div style="font-family:'DM Mono',monospace;font-size:.9rem;color:var(--accent);margin:12px 0">${url.shortUrl}</div>
        <div style="font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted)">Criado em ${new Date(url.createdAt).toLocaleDateString('pt-BR')}</div>
      </div>
      <div class="analytics-card">
        <div class="analytics-card-title">Por dispositivo</div>
        ${bars(analytics.byDevice || {}, maxD)}
      </div>
      <div class="analytics-card">
        <div class="analytics-card-title">Por navegador</div>
        ${bars(analytics.byBrowser || {}, maxB)}
      </div>
    `

    const panel = document.getElementById('analytics-panel')
    panel.classList.add('open')
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' })
  }

  function closeAnalytics() {
    document.getElementById('analytics-panel').classList.remove('open')
  }

  // Enter key
  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') createUrl() })
  document.getElementById('slug-input').addEventListener('keydown', e => { if (e.key === 'Enter') createUrl() })
</script>
</body>
</html>
